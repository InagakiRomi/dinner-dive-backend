<!-- 登入首頁 -->
<!doctype html>
<!-- 啟用 Thymeleaf 語法 -->
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <!-- 引入共用的 head -->
    <option th:replace="~{layout/headTitle :: commonHeadTitle}"></option>

    <!-- 頁面 favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />

    <th:block th:replace="~{layout/commonStyles :: navButtonAndForm}"></th:block>
    <!-- 匯入登入頁樣式 -->
    <link rel="stylesheet" href="/css/pages/index.css" />
  </head>

  <body class="login-page">
    <!-- 主標題 -->
    <div class="page-title-wrap">
      <img class="page-logo" src="/images/logo.png" alt="Dinner Dive" />
    </div>

    <!-- 登入/註冊表單區塊 -->
    <div class="formContainer">
      <h1 id="authTitle">會員登入</h1>

      <!-- 登入表單 -->
      <div id="loginPanel" class="auth-panel is-active">
        <form th:action="@{/users/login}" method="post">
          <label for="loginUsername">帳號：</label>
          <input
            type="text"
            name="username"
            id="loginUsername"
            placeholder="只能輸入英文和數字"
            maxlength="256"
            pattern="^[a-zA-Z0-9]*$"
            required
          />

          <label for="loginPassword">密碼：</label>
          <input
            type="password"
            name="password"
            id="loginPassword"
            placeholder="只能輸入英文和數字和特殊符號"
            maxlength="256"
            oninput="
              this.value = this.value.replace(
                /[^a-zA-Z0-9!@#$%^&*()_+\-=\\[\]{};':&quot;\\|,.&lt;&gt;\/?`~]/g,
                '',
              )
            "
            required
          />

          <button type="submit" class="btn btn-default btn-wide">登入</button>
          <button
            type="button"
            class="btn btn-default btn-wide"
            id="toRegisterBtn"
          >
            還沒有帳號？前往註冊
          </button>
        </form>

        <!-- 錯誤訊息：登入失敗 -->
        <div id="loginErrorMessage" th:if="${param.error}" style="display: none">
          <p>尚未註冊或密碼輸入錯誤</p>
        </div>

        <!-- 登出訊息 -->
        <div
          id="logoutFeedback"
          th:if="${param.logout}"
          class="auth-feedback auth-feedback--logout"
        >
          <p class="auth-feedback__title">你已登出</p>
        </div>
      </div>

      <!-- 註冊表單 -->
      <div id="registerPanel" class="auth-panel">
        <form id="registerForm">
          <label for="registerUsername">帳號：</label>
          <input
            type="text"
            id="registerUsername"
            name="username"
            placeholder="只能輸入英文和數字"
            maxlength="256"
            pattern="^[a-zA-Z0-9]*$"
            required
          />

          <label for="registerPassword">密碼：</label>
          <input
            type="password"
            id="registerPassword"
            name="userPassword"
            placeholder="只能輸入英文和數字和特殊符號"
            maxlength="256"
            oninput="
              this.value = this.value.replace(
                /[^a-zA-Z0-9!@#$%^&*()_+\-=\\[\]{};':&quot;\\|,.&lt;&gt;\/?`~]/g,
                '',
              )
            "
            required
          />

          <label for="registerRole">帳號類型：</label>
          <select id="registerRole" name="roles" required>
            <option value="USER" selected>一般使用者</option>
            <option value="ADMIN">管理者</option>
          </select>

          <button type="submit" class="btn btn-default btn-wide">註冊</button>
          <button type="button" class="btn btn-default btn-wide" id="toLoginBtn">
            已有帳號？點此登入
          </button>
        </form>

        <div id="registerFeedback" class="auth-feedback auth-feedback--error" hidden>
          <p id="registerFeedbackText" class="auth-feedback__title"></p>
        </div>
      </div>
    </div>

    <script type="module" src="/js/indexAuthPage.js"></script>
    <script type="module" src="/js/memberRegister.js"></script>
  </body>
</html>
