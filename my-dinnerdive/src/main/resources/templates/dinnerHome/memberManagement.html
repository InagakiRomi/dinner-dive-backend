<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <option th:replace="~{layout/headTitle :: commonHeadTitle}"></option>
    <th:block
      th:replace="~{layout/commonStyles :: navButtonAndTable}"
    ></th:block>
    <link rel="stylesheet" href="/css/pages/dinnerShared.css" />
  </head>
  <body>
    <option th:replace="~{layout/navBar :: sharedNavBar}"></option>
    <main class="member-page">
      <section class="member-card">
        <h2 class="member-title">團隊名稱</h2>
        <div th:if="${isAdmin}">
          <form id="groupNameForm" class="member-group-form">
            <input
              id="groupNameInput"
              type="text"
              maxlength="64"
              th:value="${groupName}"
              required
            />
            <button type="submit" class="btn btn-default">更新團隊名稱</button>
          </form>
        </div>
        <p th:unless="${isAdmin}">
          目前團隊名稱：<span th:text="${groupName}"></span><br />
          只有管理員可以修改團隊名稱。
        </p>
      </section>

      <section class="member-card">
        <h2 class="member-title">成員列表</h2>
        <div th:if="${isAdmin}" class="member-add-form-wrap">
          <form id="addMemberForm" class="member-group-form">
            <input
              id="targetUserIdInput"
              type="number"
              min="1"
              step="1"
              placeholder="輸入要加入的使用者 ID"
              required
            />
            <button type="submit" class="btn btn-default">加入成員</button>
          </form>
        </div>
        <table class="table member-table">
          <thead>
            <tr>
              <th>名稱</th>
              <th>角色</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="memberTableBody"></tbody>
        </table>
      </section>
    </main>

    <script th:inline="javascript">
      window.memberPageConfig = {
        isAdmin: /*[[${isAdmin}]]*/ false,
        username: /*[[${username}]]*/ "",
      };
    </script>
    <script type="module" src="/js/memberManagement.js"></script>
  </body>
</html>
