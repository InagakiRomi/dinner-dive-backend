<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <option th:replace="~{layout/headTitle :: commonHeadTitle}"></option>

    <link rel="stylesheet" href="/css/components/buttonStyle.css" />
    <link rel="stylesheet" href="/css/components/tableStyle.css" />
    <link rel="stylesheet" href="/css/layout/navBar.css" />
    <link rel="stylesheet" href="/css/pages/restaurantHistory.css" />
  </head>
  <body>
    <option th:replace="~{layout/navBar :: sharedNavBar}"></option>

    <form id="historyForm">
      <div class="historyFilters">
        <label for="orderBy">排序欄位：</label>
        <select id="orderBy">
          <option value="history_id">建立順序</option>
          <option value="category">類別</option>
          <option value="selected_at">抽選時間</option>
          <option value="restaurant_name">餐廳名稱</option>
        </select>

        <select id="sort">
          <option value="ASC">最舊/最少</option>
          <option value="DESC">最新/最多</option>
        </select>
        <button type="submit" class="btn btn-default">查詢</button>
      </div>

      <div class="historyFormActions">
        <button
          type="button"
          class="btn btn-yellow"
          onclick="window.location.href = '/dinnerHome/randomRestaurant'"
        >
          回抽餐廳
        </button>
      </div>
    </form>

    <table class="table historyTable">
      <thead>
        <tr>
          <th>編號</th>
          <th>餐廳名稱</th>
          <th>類別</th>
          <th>抽選時間</th>
        </tr>
      </thead>
      <tbody id="historyTableBody"></tbody>
    </table>

    <div class="switchPageBtn">
      <button id="prevPage" class="btn btn-default">上一頁</button>
      <div>第1頁 / 共1頁</div>
      <button id="nextPage" class="btn btn-default">下一頁</button>
    </div>

    <script src="/js/restaurantHistory.js"></script>
  </body>
</html>
